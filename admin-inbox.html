  <style>
    html, body { overflow-x: hidden; }
    
    html,
body {
  min-height: 100vh;
  overflow-x: hidden;
}

body {
  display: flex;
  flex-direction: column;
}



.inbox-container {
  flex: 1;
}

    /* ── PAGE HEADER ── */
    .inbox-header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, #064e20 100%);
      padding: 28px 24px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .inbox-header-icon {
      width: 52px; height: 52px;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; color: #bbf7d0; flex-shrink: 0;
    }
    .inbox-header h1 {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 800; color: #fff; margin: 0 0 4px;
    }
    .inbox-header p { font-size: 0.85rem; color: #bbf7d0; margin: 0; }

    /* ── CONTAINER ── */
    .inbox-container {
      max-width: 860px;
      margin: 32px auto 60px;
      padding: 0 20px;
    }

    /* ── FILTER BAR ── */
    .inbox-filter {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-pill {
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-color);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-pill.active, .filter-pill:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ── MESSAGE CARD ── */
    .message-card {
      background: var(--card-color);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: transform 0.22s, box-shadow 0.22s;
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .message-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.09);
    }
    .message-card.unread {
      border-left: 4px solid var(--primary);
    }
    /* unread dot */
    .message-card.unread::after {
      content: '';
      width: 9px; height: 9px;
      background: var(--primary);
      border-radius: 50%;
      position: absolute;
      top: 14px; right: 14px;
    }

    /* Sender avatar */
    .msg-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--primary-xlight);
      color: var(--primary-dark);
      font-weight: 800;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .msg-body { flex: 1; min-width: 0; }
    .msg-subject {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-color);
      margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .msg-sender {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .msg-date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Empty state */
    .inbox-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .inbox-empty i { font-size: 3rem; color: var(--border-light); margin-bottom: 14px; }
    .inbox-empty h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; color: var(--text-color); }
    .inbox-empty p { font-size: 0.88rem; }

    /* ── MODAL ── */
    .modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(3px);
      display: none;
      align-items: center; justify-content: center;
      z-index: 9999; padding: 20px;
    }
    .modal.show { display: flex; }

    .modal-content {
      background: var(--card-color);
      border-radius: 14px;
      padding: 28px 24px;
      max-width: 620px; width: 100%;
      position: relative;
      box-shadow: 0 16px 48px rgba(0,0,0,0.18);
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-close {
      position: absolute; top: 12px; right: 14px;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #fee2e2; color: #dc2626;
      border: none; font-size: 1rem;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .modal-close:hover { background: #dc2626; color: #fff; }

    #modalTitle {
      font-size: 1.1rem; font-weight: 700;
      color: var(--text-color); margin: 0 40px 8px 0;
    }
    .meta {
      font-size: 0.82rem; color: var(--text-muted);
      margin-bottom: 16px; display: flex; align-items: center; gap: 6px;
    }
    .meta i { color: var(--primary); }

    .modal-message-body {
      background: var(--surface-color);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.92rem;
      line-height: 1.7;
      color: var(--text-color);
      min-height: 80px;
      margin-bottom: 20px;
      white-space: pre-wrap;
    }

    .modal-footer {
      display: flex; gap: 10px; flex-wrap: wrap;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: 7px;
      cursor: pointer; border: none;
      font-size: 0.85rem; font-weight: 700;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }

    .logout-btn {
      display: flex; align-items: center; gap: 7px;
      background: #b91c1c; color: #fff;
      border: none; padding: 9px 14px;
      border-radius: 6px; cursor: pointer;
      font-weight: 700; font-size: 0.88rem;
      width: 100%; transition: background 0.2s;
    }
    .logout-btn:hover { background: #991b1b; }

    .unread-badge {
      background: #dc2626; color: #fff;
      font-size: 0.7rem; border-radius: 50%;
      padding: 1px 5px; margin-left: 4px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <!-- PAGE HEADER -->
  <div class="inbox-header">
    <div class="inbox-header-icon">
      <i class="fa-solid fa-inbox"></i>
    </div>
    <div>
      <h1 data-translate="Admin Inbox">Admin Inbox</h1>
      <p data-translate="Manage contact messages from students and visitors.">
        Manage contact messages from students and visitors.
      </p>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="inbox-container">

    <!-- FILTER PILLS -->
    <div class="inbox-filter">
      <button class="filter-pill active" data-filter="all" data-translate="All">All</button>
      <button class="filter-pill" data-filter="unread" data-translate="Unread">Unread</button>
      <button class="filter-pill" data-filter="read" data-translate="Read">Read</button>
    </div>

    <!-- MESSAGES LIST -->
    <div id="messages"></div>

  </div>

  <!-- MESSAGE MODAL -->
  <div class="modal" id="messageModal">
    <div class="modal-content">
      <button class="modal-close" id="modalCloseBtn">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <h2 id="modalTitle"></h2>
      <p class="meta" id="modalMeta"></p>
      <div class="modal-message-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="markReadBtn">
          <i class="fa-solid fa-envelope-open"></i>
          <span data-translate="Mark as Read">Mark as Read</span>
        </button>
        <button class="btn btn-danger" id="deleteBtn">
          <i class="fa-solid fa-trash"></i>

        </button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->

  <script>
    

    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('show');
    }
    document.addEventListener('click', function (e) {
      const nav = document.getElementById('navLinks');
      const hamburger = document.querySelector('.hamburger');
      if (!nav.contains(e.target) && !hamburger.contains(e.target)) nav.classList.remove('show');
    });
  </script>

  <script>
    const supabaseUrl = "https://ppspuopkprqufsxwkpnr.supabase.co";
    const supabaseKey = "sb_publishable_g7I11DNvNz7tkfFr7TAV4A_g3PO-Mai";
    window.supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
    const db = window.supabaseClient;

    let selectedMessage = null;
    let allMessages    = [];
    let currentFilter  = 'all';

    /* ── LOAD MESSAGES ── */
    async function loadMessages() {
      const { data, error } = await db
        .from("contact_messages")
        .select("*")
        .or("deleted.is.null,deleted.eq.false")
        .order("created_at", { ascending: false });

      if (error) return console.error(error);
      allMessages = data;
      renderMessages(currentFilter);
      updateUnreadCounter();
    }

    /* ── RENDER ── */
    function renderMessages(filter) {
      currentFilter = filter;
      const container = document.getElementById("messages");
      container.innerHTML = "";

      let filtered = allMessages;
      if (filter === 'unread') filtered = allMessages.filter(m => !m.is_read);
      if (filter === 'read')   filtered = allMessages.filter(m => m.is_read);

      if (!filtered.length) {
        container.innerHTML = `
          <div class="inbox-empty">
            <i class="fa-solid fa-inbox"></i>
            <h3>No messages</h3>
            <p>No messages match this filter.</p>
          </div>`;
        return;
      }

      filtered.forEach(msg => {
        const initial = (msg.name || '?')[0].toUpperCase();
        const date    = msg.created_at ? msg.created_at.split('T')[0] : '';
        const div = document.createElement("div");
        div.className = `message-card ${msg.is_read ? '' : 'unread'}`;
        div.innerHTML = `
          <div class="msg-avatar">${initial}</div>
          <div class="msg-body">
            <div class="msg-subject">${msg.subject || '(No subject)'}</div>
            <div class="msg-sender">
              <i class="fa-solid fa-user" style="font-size:0.7rem;color:var(--primary)"></i>
              ${msg.name} &nbsp;•&nbsp; ${msg.email}
            </div>
            <div class="msg-date">
              <i class="fa-solid fa-clock" style="font-size:0.7rem;"></i> ${date}
            </div>
          </div>`;
        div.onclick = () => openMessage(msg);
        container.appendChild(div);
      });
    }

    /* ── FILTER PILLS ── */
    document.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMessages(btn.dataset.filter);
      });
    });

    /* ── OPEN MODAL ── */
    function openMessage(msg) {
      selectedMessage = msg;

      document.getElementById("modalTitle").textContent = msg.subject || '(No subject)';
      document.getElementById("modalMeta").innerHTML = `
        <i class="fa-solid fa-user"></i> ${msg.name} &nbsp;•&nbsp;
        <i class="fa-solid fa-envelope"></i> ${msg.email} &nbsp;•&nbsp;
        <i class="fa-solid fa-clock"></i> ${msg.created_at ? msg.created_at.split('T')[0] : ''}`;
      document.getElementById("modalBody").textContent = msg.message;

      const markBtn  = document.getElementById("markReadBtn");
      const markSpan = markBtn.querySelector('span');
      const markIcon = markBtn.querySelector('i');
      if (msg.is_read) {
        markSpan.textContent = "Mark as Unread";
        markIcon.className   = "fa-solid fa-envelope";
      } else {
        markSpan.textContent = "Mark as Read";
        markIcon.className   = "fa-solid fa-envelope-open";
      }

      document.getElementById("messageModal").classList.add("show");
    }

    /* ── CLOSE MODAL ── */
    document.getElementById("modalCloseBtn").addEventListener('click', () => {
      document.getElementById("messageModal").classList.remove("show");
    });
    document.getElementById("messageModal").addEventListener('click', function (e) {
      if (e.target === this) this.classList.remove("show");
    });

    /* ── MARK READ / UNREAD ── */
    document.getElementById("markReadBtn").addEventListener('click', async () => {
      if (!selectedMessage) return;
      const newState = !selectedMessage.is_read;
      const { error } = await db
        .from("contact_messages")
        .update({ is_read: newState })
        .eq("id", selectedMessage.id);
      if (error) return console.error(error);
      selectedMessage.is_read = newState;
      document.getElementById("messageModal").classList.remove("show");
      loadMessages();
    });

    /* ── DELETE ── */
    document.getElementById("deleteBtn").addEventListener('click', async () => {
      if (!selectedMessage) return;
      const { error } = await db
        .from("contact_messages")
        .update({ deleted: true })
        .eq("id", selectedMessage.id);
      if (error) return console.error(error);
      document.getElementById("messageModal").classList.remove("show");
      loadMessages();
    });

    /* ── UNREAD COUNTER ── */
    function updateUnreadCounter() {
      const count = allMessages.filter(m => !m.is_read).length;
      const badge = document.getElementById("unreadCounter");
      if (badge) badge.textContent = count;
    }

    /* ── INIT ── */
    loadMessages();
  </script>
  <script src="translate.js"></script>
</body>
</html>
