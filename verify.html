<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Document Verification | Darul Abrār International Online Institute</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" href="favicon.ico">
  <link rel="manifest" href="site.webmanifest">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* CARD */
    .verify-card {
      position: relative;
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.10);
      overflow: hidden;
    }

    /* TOP ACCENT BAR */
    .card-accent {
      height: 6px;
      background: linear-gradient(90deg, #16a34a, #4ade80);
    }

    /* WATERMARK */
    .watermark {
      position: absolute;
      width: 55%;
      opacity: 0.06;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    /* CARD CONTENT */
    .card-body {
      position: relative;
      z-index: 1;
      padding: 32px 28px 28px;
    }

    /* HEADER */
    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-bottom: 20px;
      margin-bottom: 24px;
      border-bottom: 1px solid #e5e7eb;
    }

    .card-header img {
      width: 64px;
      height: auto;
      margin-bottom: 12px;
    }

    .card-header h2 {
      font-size: 1rem;
      font-weight: 800;
      color: #15803d;
      margin-bottom: 4px;
    }

    .card-header p {
      font-size: 0.78rem;
      color: #6b7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* CHECKING STATE */
    .checking {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 20px 0;
      color: #6b7280;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #dcfce7;
      border-top-color: #16a34a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* VALID STATE */
    .status-valid {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 10px;
      background: #dcfce7;
      border: 1px solid #bbf7d0;
      color: #15803d;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 20px;
    }

    .status-valid i { font-size: 1.2rem; }

    /* INVALID STATE */
    .status-invalid {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 10px;
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #991b1b;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 20px;
    }

    .status-invalid i { font-size: 1.2rem; }

    /* INFO TABLE */
    .info-table {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      background: #f9fafb;
      border: 1px solid #f3f4f6;
    }

    .info-row i {
      color: #16a34a;
      font-size: 0.9rem;
      margin-top: 2px;
      flex-shrink: 0;
      width: 16px;
    }

    .info-row .row-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9ca3af;
      display: block;
      margin-bottom: 1px;
    }

    .info-row .row-value {
      font-size: 0.92rem;
      font-weight: 600;
      color: #1f2937;
    }

    /* FOOTER */
    .card-footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #f3f4f6;
      text-align: center;
      font-size: 0.75rem;
      color: #9ca3af;
      line-height: 1.6;
    }

    .card-footer strong { color: #16a34a; }

    /* BACK LINK */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #16a34a;
      text-decoration: none;
    }

    .back-link:hover { text-decoration: underline; }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .card-body { padding: 24px 18px 20px; }
      .card-header h2 { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <div class="verify-card">
    <div class="card-accent"></div>
    <img src="logo.png" class="watermark" alt="">

    <div class="card-body">
      <div class="card-header">
        <img src="logo.png" alt="Darul Abrār Logo">
        <h2>Darul Abrār International Online Institute</h2>
        <p>Document Verification Portal</p>
      </div>

      <div id="result">
        <div class="checking">
          <div class="spinner"></div>
          <span>Verifying document, please wait...</span>
        </div>
      </div>

      <div class="card-footer">
        This verification confirms the authenticity of the admission record.<br>
        <strong>Darul Abrār International Online Institute</strong>
      </div>

      <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Back to Homepage
      </a>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ppspuopkprqufsxwkpnr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_g7I11DNvNz7tkfFr7TAV4A_g3PO-Mai";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const doc = params.get("doc");

    if (!doc) {
      showInvalid("INVALID VERIFICATION LINK");
    } else {
      const matric = doc.split("-").pop();
      verifyDocument(matric);
    }

    async function verifyDocument(matric) {
      const { data, error } = await sb
        .from("students")
        .select("fullname, matric_number, level_arabic, country")
        .eq("matric_number", matric)
        .single();

      if (error || !data) {
        showInvalid("DOCUMENT NOT FOUND");
        return;
      }

      document.getElementById("result").innerHTML = `
        <div class="status-valid">
          <i class="fa-solid fa-circle-check"></i>
          DOCUMENT VERIFIED
        </div>
        <div class="info-table">
          <div class="info-row">
            <i class="fa-solid fa-user"></i>
            <div>
              <span class="row-label">Full Name</span>
              <span class="row-value">${data.fullname}</span>
            </div>
          </div>
          <div class="info-row">
            <i class="fa-solid fa-id-card"></i>
            <div>
              <span class="row-label">Matric Number</span>
              <span class="row-value">${data.matric_number}</span>
            </div>
          </div>
          <div class="info-row">
            <i class="fa-solid fa-book-open"></i>
            <div>
              <span class="row-label">Programme</span>
              <span class="row-value">${data.level_arabic}</span>
            </div>
          </div>
          <div class="info-row">
            <i class="fa-solid fa-earth-africa"></i>
            <div>
              <span class="row-label">Country</span>
              <span class="row-value">${data.country || "N/A"}</span>
            </div>
          </div>
          <div class="info-row">
            <i class="fa-solid fa-shield-halved"></i>
            <div>
              <span class="row-label">Status</span>
              <span class="row-value">Valid Admission Record</span>
            </div>
          </div>
        </div>
      `;
    }

    function showInvalid(message) {
      document.getElementById("result").innerHTML = `
        <div class="status-invalid">
          <i class="fa-solid fa-circle-xmark"></i>
          ${message}
        </div>
        <p style="font-size:0.88rem;color:#6b7280;text-align:center;margin-top:8px;">
          The verification link is invalid or the document does not exist in our records.
          Please contact the institute for assistance.
        </p>
      `;
    }
  </script>
</body>
</html>
